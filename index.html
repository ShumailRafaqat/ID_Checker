<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insurance ID Checker</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:#0a0e17;
      color:#0ff;
      font-family:'Courier New', monospace;
      overflow:hidden;
      position:relative;
    }

    #particles {
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .container {
      position:relative;
      z-index:10;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card {
      background:rgba(10,15,25,0.88);
      backdrop-filter:blur(12px);
      border:2px solid #0ff4;
      border-radius:14px;
      padding:2.5rem 2rem;
      width:100%;
      max-width:460px;
      box-shadow:0 0 35px #0ff4, inset 0 0 18px #0ff2;
      text-align:center;
    }

    .card::before {
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(transparent, #0ff2 50%, transparent);
      opacity:0.12;
      animation:scan 7s linear infinite;
      pointer-events:none;
    }

    @keyframes scan {
      0% { transform:translateY(-100%); }
      100% { transform:translateY(200%); }
    }

    h1 {
      font-size:2.1rem;
      margin-bottom:0.8rem;
      color:#0ff;
      text-shadow:0 0 12px #0ff;
      letter-spacing:2px;
    }

    .tagline {
      color:#0ff9;
      font-size:1rem;
      margin-bottom:1.8rem;
    }

    .input-group {
      position:relative;
      margin:1.5rem 0;
    }

    input {
      width:100%;
      padding:15px 20px 15px 55px;
      background:#0009;
      border:2px solid #0ff5;
      border-radius:8px;
      color:#0ff;
      font-size:1.25rem;
      text-align:center;
      letter-spacing:2px;
      font-family:'Courier New', monospace;
      transition:all 0.3s;
    }

    input:focus {
      border-color:#0ff;
      box-shadow:0 0 20px #0ff6, inset 0 0 12px #0ff3;
      outline:none;
    }

    .icon {
      position:absolute;
      left:18px;
      top:50%;
      transform:translateY(-50%);
      color:#0ff9;
      font-size:1.5rem;
    }

    button {
      width:100%;
      padding:14px;
      background:linear-gradient(90deg, #0ff, #00f8);
      color:#000e;
      border:none;
      border-radius:8px;
      font-size:1.2rem;
      font-weight:bold;
      cursor:pointer;
      transition:all 0.35s;
      box-shadow:0 0 25px #0ff5;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    button:hover:not(:disabled) {
      transform:scale(1.04);
      box-shadow:0 0 40px #0ff8;
    }

    button:disabled {
      background:#444;
      cursor:not-allowed;
      box-shadow:none;
    }

    #result {
      margin-top:1.8rem;
      padding:1.2rem;
      border-radius:8px;
      font-size:1.4rem;
      font-weight:bold;
      min-height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      opacity:0;
      transform:translateY(15px);
      transition:all 0.5s ease;
    }

    #result.show {
      opacity:1;
      transform:translateY(0);
    }

    .success {
      color:#0f0;
      background:rgba(0,255,0,0.1);
      border:2px solid #0f04;
      text-shadow:0 0 12px #0f0;
    }

    .error {
      color:#f44;
      background:rgba(255,0,0,0.1);
      border:2px solid #f004;
      text-shadow:0 0 12px #f00;
      animation:glitch 1.5s infinite;
    }

    @keyframes glitch {
      0%,100% { transform:translate(0); }
      20% { transform:translate(-2px,2px); }
      40% { transform:translate(2px,-2px); }
      60% { transform:translate(-1px,1px); }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="card">
    <h1>Insurance ID Checker</h1>
    <div class="tagline">Verify Uniqueness • Real-time Scan</div>

    <div class="input-group">
      <i class="fa-solid fa-id-card icon"></i>
      <input 
        id="insuranceID" 
        type="text" 
        placeholder="Enter 11-digit Insurance ID"
        maxlength="11"
        pattern="\d{11}"
        inputmode="numeric"
      />
    </div>

    <button id="checkBtn" onclick="checkID()">
      <i class="fa-solid fa-shield-halved"></i> CHECK ID
    </button>

    <div id="result"></div>
  </div>
</div>

<script>
// Particle background (same as before)
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * -canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speed = Math.random() * 2 + 1;
  }
  update() {
    this.y += this.speed;
    if (this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.fillStyle = '#0ff4';
    ctx.fillRect(this.x, this.y, this.size, this.size * 8);
  }
}

for (let i = 0; i < 100; i++) particlesArray.push(new Particle());

function animate() {
  ctx.fillStyle = 'rgba(10,14,23,0.06)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Check function - CORS fix with text/plain
async function checkID() {
  const btn = document.getElementById('checkBtn');
  const resultDiv = document.getElementById('result');
  const input = document.getElementById('insuranceID').value.trim();

  if (!/^\d{11}$/.test(input)) {
    showResult("Enter valid 11-digit ID", "error");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Scanning...';
  resultDiv.className = '';
  resultDiv.classList.remove('show');

  try {
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxqB2IKWZU5DC46HlsZsr-61N-S1fun2-3dFO8pGlxdxHo150xUl0d-DZ4HG70CrVnJ/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"  // This makes it a simple request → no preflight → CORS bypass
        },
        body: JSON.stringify({ id: input })
      }
    );

    if (!response.ok) {
      throw new Error("Server responded with error");
    }

    const data = await response.json();

    if (data.status === "duplicate") {
      showResult("❌ Duplicate Insurance ID Found", "error");
    } else if (data.status === "unique") {
      showResult("✅ Insurance ID is Unique", "success");
    } else {
      showResult("⚠️ " + (data.message || "Unknown response"), "error");
    }

  } catch (err) {
    console.error("Fetch error:", err);
    showResult("⚠️ Network / CORS Error - Try Again or Check Deployment", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> CHECK ID';
  }
}

function showResult(msg, type) {
  const result = document.getElementById('result');
  result.innerHTML = msg;
  result.className = type;
  result.classList.add('show');
}
</script>
</body>
</html>
